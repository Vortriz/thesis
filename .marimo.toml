[formatting]
line_length = 100

[snippets]
custom_paths = []
include_default_snippets = true

[save]
autosave = "after_delay"
autosave_delay = 1000
format_on_save = true

[ai]
inline_tooltip = false
mode = "manual"
rules = ""

[ai.models]
custom_models = []
displayed_models = []

[keymap]
destructive_delete = true
preset = "default"

[keymap.overrides]

[display]
dataframes = "rich"
reference_highlighting = false
default_table_page_size = 10
theme = "light"
default_width = "medium"
code_editor_font_size = 18
default_table_max_columns = 50
cell_output = "below"

[language_servers.pylsp]
enable_pylint = false
enable_flake8 = false
enable_pydocstyle = false
enabled = true
enable_mypy = true
enable_ruff = true
enable_pyflakes = false

[language_servers.basedpyright]

[language_servers.ty]
enabled = false

[completion]
copilot = "github"
activate_on_typing = true

[runtime]
output_max_bytes = 8000000
auto_reload = "off"
on_cell_change = "autorun"
default_sql_output = "auto"
dotenv = []
default_auto_download = []
reactive_tests = true
std_stream_max_bytes = 1000000
watcher_on_save = "lazy"
auto_instantiate = false

[diagnostics]
sql_linter = true

[experimental]
external_agents = true

[datasources]

[mcp]
presets = []

[mcp.mcpServers]

[package_management]
manager = "uv"

[server]
browser = "default"
follow_symlink = false
