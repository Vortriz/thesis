[package_management]
manager = "uv"

[snippets]
custom_paths = []
include_default_snippets = true

[display]
code_editor_font_size = 16
default_width = "medium"
theme = "light"
cell_output = "above"
dataframes = "rich"
default_table_page_size = 10

[server]
follow_symlink = false
browser = "default"

[ai]
rules = ""

[formatting]
line_length = 79

[completion]
activate_on_typing = true
copilot = "github"

[language_servers.pylsp]
enabled = true
enable_pyflakes = false
enable_pydocstyle = false
enable_flake8 = false
enable_mypy = true
enable_ruff = true
enable_pylint = false

[experimental]

[runtime]
auto_instantiate = false
on_cell_change = "autorun"
reactive_tests = true
default_sql_output = "auto"
output_max_bytes = 8000000
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
auto_reload = "off"

[keymap]
preset = "default"

[keymap.overrides]

[save]
autosave = "after_delay"
autosave_delay = 1000
format_on_save = true
